%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam;
imu: 1
num_of_cam: 2

imu_topic: "/imu0"
image0_topic: "/cam0/image_raw"
image1_topic: "/cam1/image_raw"
output_path: "/home/tony-ws1/output/"

cam0_calib: "cam0.yaml"
cam1_calib: "cam1.yaml"
image_width: 800
image_height: 400


# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.

# body_T_cam0 / body_T_cam1 = inverse(T_cam_imu) from calibration/camchain.yaml.
# Verified: baseline ||cam0 - cam1|| = 0.3005 m (matches undistorted_calib_stereo.txt).
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.9998852243, -0.0068901619,  0.0134931082,  0.1762014874,
          -0.0135229611,  0.0043046370, -0.9998992947, -0.0557440651,
           0.0068313851, -0.9999669973, -0.0043973184,  0.0022354924,
           0.0,           0.0,           0.0,           1.0]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.9999948729,  0.0031734673,  0.0004280637, -0.1243117670,
          -0.0004110403,  0.0053629797, -0.9999855346, -0.0566833978,
          -0.0031757171, -0.9999805836, -0.0053616478,  0.0016487326,
           0.0,           0.0,           0.0,           1.0]

#Multiple thread support
multiple_thread: 0      # offline replay — keep 0 (per KITTI lesson); bag played at reduced rate so backend keeps up

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 0           # publish tracking image as topic (0 = headless)
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04   # max solver iteration time (s), to guarantee real time
max_num_iterations: 8   # max solver iterations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
# NOTE: 4Seasons calibration.zip ships only camera calibration (camchain.yaml + calib_*.txt);
# it does NOT include IMU noise densities. These are standard EuRoC-class values.
acc_n: 0.1          # accelerometer measurement noise standard deviation.
gyr_n: 0.01         # gyroscope measurement noise standard deviation.
acc_w: 0.001        # accelerometer bias random work noise standard deviation.
gyr_w: 0.0001       # gyroscope bias random work noise standard deviation.
g_norm: 9.81007     # gravity magnitude

#unsynchronization parameters
estimate_td: 1                      # online estimate time offset between camera and imu (timeshift_cam_imu ~ -5e-6 s, negligible; let VINS refine)
td: 0.0                             # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/home/tony-ws1/output/pose_graph/" # save and load path
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0
